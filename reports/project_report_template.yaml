design_choices:
  correlation_computation: "Spearman correlation using pandas and scipy. It was chosen to handle non-linear monotonic relationships between features and the target variable."
  QUBO_optimization_algorithm:
    algorithm_name: "Simulated Annealing"
    library_used: "dimod and dwave-neal"
    reason_for_choice: "It is an accessible, open-source heuristic solver that runs locally without requiring a D-Wave quantum API token, while still satisfying the QUBO optimization requirement."
  classification_algorithm:
    algorithm_name: "Random Forest, Logistic Regression, Gradient Boosting"
    library_used: "scikit-learn"
    reason_for_choice: "Random Forest was chosen as it was mandatory per specifications. Logistic Regression and Gradient Boosting were added to provide a solid comparison baseline."
  gui_development: "Streamlit. It allowed for rapid UI prototyping directly in Python, easily supporting a progressive disclosure wizard-flow via session states and clean data metrics visualization."
  problems_encountered:
    - problem: "Confusion regarding the output size of the selected features (confusing sample reduction with feature reduction)."
      solution: "The LLM clarified the underlying math, proving that the algorithm correctly selected the target 20% of the available features."
  notes: "A strict prompt engineering rule was enforced to ensure the LLM always appended required libraries to the requirements.txt file after generating code."

